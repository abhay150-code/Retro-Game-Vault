<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Game Vault</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <h1>RETRO<span class="neon-text">VAULT</span></h1>
        </div>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search games...">
            <div id="search-spinner" class="spinner hidden"></div>
        </div>
    </header>

    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-section">
                <h2>Favorites</h2>
                <div id="favorites-list" class="favorites-list"></div>
            </div>
        </aside>

        <main class="main-content">
            <div id="game-grid" class="game-grid"></div>
            <div id="main-spinner" class="spinner main-loader hidden"></div>
            <div id="observer-target" class="observer-target"></div>
        </main>
    </div>

    <!-- Modals -->
    <div id="game-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <button id="close-modal" class="close-btn">&times;</button>
            <div class="modal-header">
                <img id="modal-image" src="" alt="Game Poster" class="backdrop">
                <div class="modal-title-info">
                    <h2 id="modal-title"></h2>
                    <div class="modal-meta">
                        <span id="modal-rating" class="badge"></span>
                        <span id="modal-date" class="badge"></span>
                    </div>
                    <div id="modal-genres" class="genres"></div>
                </div>
                <button id="modal-favorite-btn" class="fav-icon-btn">★</button>
            </div>
            <div class="modal-body">
                <p id="modal-description"></p>
                <div class="screenshots-container">
                    <h3>Screenshots</h3>
                    <div id="modal-screenshots" class="screenshots-grid"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
