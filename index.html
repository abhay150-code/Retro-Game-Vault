<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Retro Game Vault - A modern neo-themed game discovery web application utilizing RAWG API.">
    <title>Retro Game Vault</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="logo">
            <h1>RETRO<span class="neon-text">VAULT</span></h1>
        </div>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search games...">
            <div id="search-spinner" class="spinner hidden"></div>
        </div>
    </header>

    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-section">
                <h2>Favorites</h2>
                <div id="favorites-list" class="favorites-list"></div>
            </div>
            <div class="sidebar-section">
                <h2>Compare Mode</h2>
                <div id="compare-dock" class="compare-dock">
                    <p class="empty-msg">Select two games to compare</p>
                    <div id="compare-slots" class="compare-slots"></div>
                    <button id="compare-btn" class="btn hidden" disabled>Compare</button>
                    <button id="clear-compare-btn" class="btn hidden">Clear</button>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div class="filters-container">
                <select id="platform-filter" class="filter-select">
                    <option value="">All Platforms</option>
                    <option value="4">PC</option>
                    <option value="187">PlayStation</option>
                    <option value="1">Xbox</option>
                    <option value="7">Nintendo</option>
                </select>
                <select id="sort-select" class="filter-select">
                    <option value="-rating">Top Rated</option>
                    <option value="-released">Newest</option>
                    <option value="name">Name (A-Z)</option>
                    <option value="-name">Name (Z-A)</option>
                </select>
            </div>
            <div id="game-grid" class="game-grid"></div>
            <div id="main-spinner" class="spinner main-loader hidden"></div>
            <div id="observer-target" class="observer-target"></div>
        </main>
    </div>

    <!-- Modals -->
    <div id="game-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <button id="close-modal" class="close-btn">&times;</button>
            <div class="modal-header">
                <img id="modal-image" src="" alt="Game Poster" class="backdrop">
                <div class="modal-title-info">
                    <h2 id="modal-title"></h2>
                    <div class="modal-meta">
                        <span id="modal-rating" class="badge"></span>
                        <span id="modal-date" class="badge"></span>
                    </div>
                    <div id="modal-genres" class="genres"></div>
                </div>
                <button id="modal-favorite-btn" class="fav-icon-btn">★</button>
            </div>
            <div class="modal-body">
                <p id="modal-description"></p>
                <div class="screenshots-container">
                    <h3>Screenshots</h3>
                    <div id="modal-screenshots" class="screenshots-grid"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="compare-modal" class="modal-overlay hidden">
        <div class="modal-content compare-content">
            <button id="close-compare-modal" class="close-btn">&times;</button>
            <h2>Compare Games</h2>
            <div id="compare-results" class="compare-side-by-side"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
